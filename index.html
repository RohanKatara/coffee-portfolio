<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A 3D coffee-themed portfolio — step inside the café." />
    <title>Coffee Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Preload the Draco WASM decoder from local /draco/ (no CDN dependency) -->

    <link rel="preload" href="/draco/draco_decoder.wasm" as="fetch" crossorigin />

    <!-- Preload the hero GLBs — largest assets, start fetching before JS parses -->
    <link rel="preload" href="/models/barista.glb" as="fetch" crossorigin />
    <link rel="preload" href="/models/espresso_machine.glb" as="fetch" crossorigin />
    <link rel="preload" href="/models/coffee_grinder.glb" as="fetch" crossorigin />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
