<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Automate Pro — Demo Player</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Close button ─────────────────────────────────────────────── */
    .close-btn {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 20;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.75);
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .close-btn:active { transform: scale(0.93); }

    /* ── Player wrapper ───────────────────────────────────────────── */
    .player-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      background: #0f172a;
      overflow: hidden;
    }

    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Desktop / landscape: 16:9 letterboxed ──────────────────── */
    @media (orientation: landscape), (min-width: 769px) {
      .player-wrap {
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        transform: translate(-50%, -50%);
      }
    }

    /* ── Mobile portrait: rotate 90° so animation appears landscape */
    @media (orientation: portrait) and (max-width: 768px) {
      .player-wrap {
        /* swap axes: width = viewport height, height = viewport width */
        width: 100vh;
        height: 100vw;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center center;
      }

      /* push close btn into the rotated frame's top-right corner */
      .close-btn {
        top: auto;
        right: auto;
        bottom: 16px;
        left: 14px;
        /* counter-rotate so it reads upright to the user */
        transform: rotate(-90deg);
      }
    }
  </style>
</head>
<body>
  <button
    class="close-btn"
    onclick="window.parent.postMessage('closeDemoPlayer', '*')"
    aria-label="Close demo"
  >&#10005;</button>

  <div class="player-wrap">
    <iframe
      src="/automate-pro-demo/index.html"
      allow="autoplay"
      title="Automate Pro: AI Lead Gatekeeper — Interactive Demo"
    ></iframe>
  </div>
</body>
</html>
